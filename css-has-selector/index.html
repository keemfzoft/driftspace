<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            padding: 16px;
            border: 1px solid gray;

            img {
                width: 200px;
            }
        }

        .card:has(img) {
            background-color: #e0f7fa;
            border-color: #00bcd4;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>Post Title</h2>
        <img src="driftspace-cover.png" alt="A cover image in the post" />
    </div>
    <div class="card">
        <h2>Post Title</h2>
        <p>This is a sample post.</p>
    </div>
</body>
</html>
